<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tavily Search</title>
</head>
<body>
  <script>
    /**
     * Calls the Tavily Search API and returns formatted results.
     * @param {string} query - The search query.
     * @param {string} apiKey - The Tavily API key.
     * @param {number} maxResults - Max number of results (1-10).
     * @param {boolean} includeAnswer - Whether to include AI answer.
     */
    async function tavilySearch(query, apiKey, maxResults, includeAnswer) {
      const response = await fetch("https://api.tavily.com/search", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          query: query,
          max_results: maxResults,
          include_answer: includeAnswer
        })
      });

      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`Tavily API error (${response.status}): ${errText}`);
      }

      return await response.json();
    }

    /**
     * Formats Tavily API response into a readable text result.
     */
    function formatResults(data) {
      let output = "";

      if (data.answer) {
        output += `--- ANSWER ---\n${data.answer}\n\n`;
      }

      const results = data.results || [];
      if (results.length > 0) {
        output += "--- SOURCES ---\n";
        for (const r of results) {
          const title = r.title || "No title";
          const url = r.url || "";
          const content = r.content || "";
          // Truncate content to keep context manageable
          const snippet = content.length > 300
            ? content.substring(0, 300) + "..."
            : content;
          output += `${title}\n${url}\n${snippet}\n\n`;
        }
      }

      if (!output.trim()) {
        return { error: "No results found for this query." };
      }

      // Cap total output to save LLM context
      if (output.length > 5000) {
        output = output.substring(0, 5000) + "\n\n... [TRUNCATED TO SAVE CONTEXT]";
      }

      return { result: output };
    }

    window["ai_edge_gallery_get_result"] = async (data, secret) => {
      try {
        const jsonData = JSON.parse(data);

        if (!jsonData.query) {
          return JSON.stringify({ error: "No search query provided." });
        }
        if (!secret) {
          return JSON.stringify({ error: "Tavily API key is required. Please provide your API key." });
        }

        const query = jsonData.query;
        const maxResults = Math.min(Math.max(jsonData.max_results || 5, 1), 10);
        const includeAnswer = jsonData.include_answer !== false;

        const apiResponse = await tavilySearch(query, secret, maxResults, includeAnswer);
        const formatted = formatResults(apiResponse);

        return JSON.stringify(formatted);
      } catch (e) {
        console.error(e);
        return JSON.stringify({ error: `Tavily search failed: ${e.message}` });
      }
    };
  </script>
</body>
</html>
